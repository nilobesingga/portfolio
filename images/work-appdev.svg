<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <pattern id="dots4" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="rgba(0,212,255,0.08)"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(0,212,255,0.5)"/>
    </marker>
  </defs>
  <rect width="600" height="400" fill="#0a0e1a"/>
  <rect width="600" height="400" fill="url(#dots4)"/>
  <!-- Header -->
  <rect width="600" height="44" fill="#0d1428"/>
  <rect width="600" height="1" y="44" fill="rgba(0,212,255,0.2)"/>
  <text x="20" y="27" font-family="monospace" font-size="10" fill="#00d4ff" font-weight="bold">AAI · Application Architecture</text>
  <text x="400" y="27" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.4)">System Design · Logistics Platform</text>
  <rect x="530" y="12" width="58" height="20" rx="3" fill="rgba(0,255,120,0.1)" stroke="rgba(0,255,120,0.25)" stroke-width="1"/>
  <text x="559" y="25" font-family="monospace" font-size="7" fill="#00ff78" text-anchor="middle">v3.4 LIVE</text>
  <!-- Architecture diagram -->
  <!-- Client layer -->
  <text x="50" y="75" font-family="monospace" font-size="7" fill="rgba(0,212,255,0.35)">CLIENT LAYER</text>
  <rect x="20" y="82" width="80" height="38" rx="5" fill="rgba(0,212,255,0.07)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="60" y="98" font-family="monospace" font-size="7" fill="#00d4ff" text-anchor="middle">Web Browser</text>
  <text x="60" y="111" font-family="monospace" font-size="6" fill="rgba(0,212,255,0.4)" text-anchor="middle">Vue.js SPA</text>
  <rect x="110" y="82" width="80" height="38" rx="5" fill="rgba(0,212,255,0.07)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="150" y="98" font-family="monospace" font-size="7" fill="#00d4ff" text-anchor="middle">Mobile App</text>
  <text x="150" y="111" font-family="monospace" font-size="6" fill="rgba(0,212,255,0.4)" text-anchor="middle">Flutter</text>
  <!-- Arrows client to API -->
  <line x1="60" y1="120" x2="60" y2="148" stroke="rgba(0,212,255,0.35)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="120" x2="150" y2="148" stroke="rgba(0,212,255,0.35)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- API Gateway -->
  <text x="50" y="145" font-family="monospace" font-size="7" fill="rgba(0,212,255,0.35)">API GATEWAY</text>
  <rect x="20" y="152" width="170" height="38" rx="5" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>
  <text x="105" y="168" font-family="monospace" font-size="8" fill="#00d4ff" text-anchor="middle" font-weight="bold">Laravel REST API</text>
  <text x="105" y="181" font-family="monospace" font-size="6" fill="rgba(0,212,255,0.5)" text-anchor="middle">Auth · Rate Limit · Routing</text>
  <!-- Arrows API to services -->
  <line x1="105" y1="190" x2="105" y2="218" stroke="rgba(0,212,255,0.35)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="60" y1="190" x2="40" y2="218" stroke="rgba(0,212,255,0.25)" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="150" y1="190" x2="170" y2="218" stroke="rgba(0,212,255,0.25)" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Services layer -->
  <text x="16" y="215" font-family="monospace" font-size="7" fill="rgba(0,212,255,0.35)">SERVICES</text>
  <rect x="16" y="222" width="68" height="38" rx="5" fill="rgba(168,85,247,0.07)" stroke="rgba(168,85,247,0.25)" stroke-width="1"/>
  <text x="50" y="238" font-family="monospace" font-size="7" fill="#a855f7" text-anchor="middle">Shipment</text>
  <text x="50" y="250" font-family="monospace" font-size="6" fill="rgba(168,85,247,0.4)" text-anchor="middle">Service</text>
  <rect x="91" y="222" width="68" height="38" rx="5" fill="rgba(0,255,120,0.06)" stroke="rgba(0,255,120,0.25)" stroke-width="1"/>
  <text x="125" y="238" font-family="monospace" font-size="7" fill="#00ff78" text-anchor="middle">Inventory</text>
  <text x="125" y="250" font-family="monospace" font-size="6" fill="rgba(0,255,120,0.4)" text-anchor="middle">Service</text>
  <rect x="166" y="222" width="68" height="38" rx="5" fill="rgba(255,144,0,0.06)" stroke="rgba(255,144,0,0.25)" stroke-width="1"/>
  <text x="200" y="238" font-family="monospace" font-size="7" fill="#FF9000" text-anchor="middle">Reporting</text>
  <text x="200" y="250" font-family="monospace" font-size="6" fill="rgba(255,144,0,0.4)" text-anchor="middle">Service</text>
  <!-- Arrows to DB -->
  <line x1="50" y1="260" x2="50" y2="290" stroke="rgba(0,212,255,0.25)" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="125" y1="260" x2="125" y2="290" stroke="rgba(0,212,255,0.25)" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="200" y1="260" x2="200" y2="290" stroke="rgba(0,212,255,0.25)" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Database layer -->
  <text x="16" y="287" font-family="monospace" font-size="7" fill="rgba(0,212,255,0.35)">DATA LAYER</text>
  <rect x="16" y="293" width="80" height="38" rx="5" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <text x="56" y="309" font-family="monospace" font-size="7" fill="#00d4ff" text-anchor="middle">MySQL DB</text>
  <text x="56" y="321" font-family="monospace" font-size="6" fill="rgba(0,212,255,0.35)" text-anchor="middle">Primary</text>
  <rect x="104" y="293" width="80" height="38" rx="5" fill="rgba(255,144,0,0.06)" stroke="rgba(255,144,0,0.2)" stroke-width="1"/>
  <text x="144" y="309" font-family="monospace" font-size="7" fill="#FF9000" text-anchor="middle">Redis Cache</text>
  <text x="144" y="321" font-family="monospace" font-size="6" fill="rgba(255,144,0,0.35)" text-anchor="middle">Sessions/Queue</text>
  <!-- External services -->
  <text x="16" y="358" font-family="monospace" font-size="7" fill="rgba(0,212,255,0.35)">INFRA</text>
  <rect x="16" y="363" width="50" height="25" rx="3" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="41" y="378" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.35)" text-anchor="middle">Docker</text>
  <rect x="72" y="363" width="50" height="25" rx="3" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="97" y="378" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.35)" text-anchor="middle">Nginx</text>
  <rect x="128" y="363" width="50" height="25" rx="3" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="153" y="378" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.35)" text-anchor="middle">Ubuntu</text>
  <!-- Right panel: API endpoints -->
  <rect x="248" y="55" width="340" height="330" rx="6" fill="rgba(0,0,0,0.3)" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <text x="260" y="72" font-family="monospace" font-size="8" fill="rgba(0,212,255,0.5)">API Endpoints · v3.4</text>
  <rect x="248" y="76" width="340" height="1" fill="rgba(0,212,255,0.1)"/>
