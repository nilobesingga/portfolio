  <rect x="256" y="82" width="36" height="12" rx="2" fill="rgba(0,255,120,0.15)"/>
  <text x="274" y="91" font-family="monospace" font-size="6" fill="#00ff78" text-anchor="middle">GET</text>
  <text x="300" y="91" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.5)">/api/v1/shipments</text>
  <rect x="256" y="100" width="44" height="12" rx="2" fill="rgba(0,212,255,0.15)"/>
  <text x="278" y="109" font-family="monospace" font-size="6" fill="#00d4ff" text-anchor="middle">POST</text>
  <text x="308" y="109" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.5)">/api/v1/shipments</text>
  <rect x="256" y="118" width="40" height="12" rx="2" fill="rgba(252,163,38,0.15)"/>
  <text x="276" y="127" font-family="monospace" font-size="6" fill="rgba(252,163,38,0.8)" text-anchor="middle">PUT</text>
  <text x="304" y="127" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.5)">/api/v1/shipments/&#123;id&#125;</text>
  <rect x="256" y="136" width="50" height="12" rx="2" fill="rgba(255,80,80,0.15)"/>
  <text x="281" y="145" font-family="monospace" font-size="6" fill="rgba(255,80,80,0.8)" text-anchor="middle">DELETE</text>
  <text x="314" y="145" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.5)">/api/v1/shipments/&#123;id&#125;</text>
  <rect x="248" y="156" width="340" height="1" fill="rgba(0,212,255,0.06)"/>
  <rect x="256" y="162" width="36" height="12" rx="2" fill="rgba(0,255,120,0.15)"/>
  <text x="274" y="171" font-family="monospace" font-size="6" fill="#00ff78" text-anchor="middle">GET</text>
  <text x="300" y="171" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.5)">/api/v1/warehouses</text>
  <rect x="256" y="180" width="36" height="12" rx="2" fill="rgba(0,255,120,0.15)"/>
  <text x="274" y="189" font-family="monospace" font-size="6" fill="#00ff78" text-anchor="middle">GET</text>
  <text x="300" y="189" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.5)">/api/v1/inventory</text>
  <rect x="256" y="198" width="44" height="12" rx="2" fill="rgba(0,212,255,0.15)"/>
  <text x="278" y="207" font-family="monospace" font-size="6" fill="#00d4ff" text-anchor="middle">POST</text>
  <text x="308" y="207" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.5)">/api/v1/inventory/receive</text>
  <rect x="248" y="218" width="340" height="1" fill="rgba(0,212,255,0.06)"/>
  <rect x="256" y="224" width="36" height="12" rx="2" fill="rgba(0,255,120,0.15)"/>
  <text x="274" y="233" font-family="monospace" font-size="6" fill="#00ff78" text-anchor="middle">GET</text>
  <text x="300" y="233" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.5)">/api/v1/reports/daily</text>
  <rect x="256" y="242" width="36" height="12" rx="2" fill="rgba(0,255,120,0.15)"/>
  <text x="274" y="251" font-family="monospace" font-size="6" fill="#00ff78" text-anchor="middle">GET</text>
  <text x="300" y="251" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.5)">/api/v1/auth/me</text>
  <rect x="256" y="260" width="44" height="12" rx="2" fill="rgba(0,212,255,0.15)"/>
  <text x="278" y="269" font-family="monospace" font-size="6" fill="#00d4ff" text-anchor="middle">POST</text>
  <text x="308" y="269" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.5)">/api/v1/auth/login</text>
  <!-- Response sample -->
  <rect x="256" y="282" width="324" height="88" rx="4" fill="rgba(0,0,0,0.4)" stroke="rgba(0,212,255,0.08)" stroke-width="1"/>
  <text x="264" y="296" font-family="monospace" font-size="6" fill="rgba(0,212,255,0.4)">// Sample response: GET /api/v1/shipments</text>
  <text x="264" y="309" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.35)">&#123; "status": "ok", "data": [</text>
  <text x="264" y="321" font-family="monospace" font-size="6" fill="rgba(252,163,38,0.5)">   &#123; "id": 101, "tracking": "SH-101",</text>
  <text x="264" y="333" font-family="monospace" font-size="6" fill="rgba(252,163,38,0.5)">     "status": "in_transit",</text>
  <text x="264" y="345" font-family="monospace" font-size="6" fill="rgba(252,163,38,0.5)">     "destination": "Cebu City" &#125;</text>
  <text x="264" y="357" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.25)">  ], "meta": &#123; "total": 1842 &#125; &#125;</text>
  <!-- Stack footer -->
  <rect x="0" y="376" width="600" height="24" fill="rgba(0,0,0,0.5)"/>
  <rect x="0" y="376" width="600" height="1" fill="rgba(0,212,255,0.12)"/>
  <text x="12" y="391" font-family="monospace" font-size="7" fill="rgba(0,212,255,0.4)">Stack: Laravel · Vue.js · MySQL · Redis · Docker · Nginx</text>
